schema_version: "1.0"
preset:
  id: "infrahub"
  name: "Infrahub Workflow Routing"
  version: "1.0.0"
  description: "Routes speckit commands to Infrahub-specific templates when .infrahub.yml is detected. Includes connectivity gating via infrahubctl info and multi-artifact dependency ordering."
  author: "opsmill"
  repository: "https://github.com/opsmill/speckit-infrahub"
  license: "Apache-2.0"
requires:
  speckit_version: ">=0.4.1"
  extensions:
    - "infrahub"
provides:
  templates:
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Specification command with Infrahub artifact routing and mandatory skill invocation"
      replaces: "speckit.specify"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Planning command with mandatory Infrahub skill invocation for design artifacts"
      replaces: "speckit.plan"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Implementation command with mandatory Infrahub skill invocation before artifact tasks"
      replaces: "speckit.implement"
tags:
  - "infrahub"
  - "infrastructure"
  - "routing"
  - "opsmill"
